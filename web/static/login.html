<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户登录</title>
    <link rel="stylesheet" href="/admin/static/common.css">
  <link rel="stylesheet" href="/admin/static/login.css">
</head>
<body>
  <div class="page-container">
    <div class="aurora-bg">
      <div class="aurora-blob blob-1"></div>
      <div class="aurora-blob blob-2"></div>
      <div class="aurora-blob blob-3"></div>
    </div>
    <div class="noise-overlay"></div>

    <main class="main-card">
      <section class="visual-side">
        <div class="visual-bg"></div>
        <div class="trajectories">
          <div class="trajectory t1"><div class="trajectory-line"></div><div class="trajectory-packet"></div></div>
          <div class="trajectory t2"><div class="trajectory-line"></div><div class="trajectory-packet"></div></div>
          <div class="trajectory t3"><div class="trajectory-line"></div><div class="trajectory-packet"></div></div>
        </div>

        <div class="visual-content">
          <div class="brand-box">
            <img class="brand-logo" src="/admin/static/logo.png" alt="Logo" onerror="this.style.display='none'">
            <span class="brand-text">NEXUS ADMIN</span>
          </div>

          <div class="slogan-box">
            <h1 class="hero-title">构建<br>无界未来</h1>
            <p class="hero-sub">为开发者打造的下一代云原生架构，<br />极致的性能与安全。</p>
          </div>

          <div class="trust-box">
            <div class="avatar-group">
              <div class="avatar"></div>
              <div class="avatar"></div>
              <div class="avatar"></div>
            </div>
            <span>加入 10,000+ 开发者社区</span>
          </div>
        </div>
      </section>

      <section class="form-side">
        <div class="form-wrapper">
          <div id="errorText" class="toast error"></div>

          <div class="form-header">
            <img class="form-logo" src="/admin/static/logo.png" alt="Logo" onerror="this.style.display='none'">
            <h2>Login</h2>
            <p>Sign in with your admin account.</p>
          </div>

          <form id="loginForm" class="form-stack">
            <div class="input-item">
              <label for="username">用户名</label>
              <input class="text-input" type="text" id="username" name="username" required placeholder="请输入用户名" autocomplete="username" autofocus>
            </div>

            <div class="input-item">
              <label for="password">密码</label>
              <input class="text-input" type="password" id="password" name="password" required placeholder="请输入密码" autocomplete="current-password">
            </div>

            <button type="submit" class="submit-btn">Login</button>
          </form>
        </div>
      </section>
    </main>
  </div>

    <script src="/admin/static/login.js"></script>
</body>
</html>
