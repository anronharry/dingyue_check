<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理控制台登录</title>
  <style>
    :root {
      --bg: #f3f3f3;
      --card: #ffffff;
      --ink: #101010;
      --muted: #666666;
      --line: #d8d8d8;
      --danger: #b3261e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background: linear-gradient(140deg, #f7f7f7, #ececec);
      color: var(--ink);
      font-family: "IBM Plex Sans", "Noto Sans SC", "Segoe UI", sans-serif;
    }
    .card {
      width: min(420px, calc(100vw - 24px));
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card);
      padding: 22px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
    }
    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.2px;
    }
    .sub {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    form {
      margin-top: 16px;
      display: grid;
      gap: 12px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--muted);
    }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 11px;
      padding: 11px 12px;
      font-size: 14px;
      background: #fff;
      color: var(--ink);
    }
    input:focus {
      outline: none;
      border-color: #101010;
      box-shadow: 0 0 0 3px rgba(16, 16, 16, 0.1);
    }
    button {
      border: 1px solid #000;
      border-radius: 11px;
      padding: 11px 12px;
      font-size: 14px;
      font-weight: 600;
      background: #111;
      color: #fff;
      cursor: pointer;
    }
    button:hover { background: #232323; }
    .error {
      min-height: 18px;
      margin-top: 8px;
      font-size: 13px;
      color: var(--danger);
    }
  </style>
</head>
<body>
  <section class="card">
    <h1>运维控制台</h1>
    <p class="sub">请输入管理员账号和口令后继续。</p>
    <form id="loginForm">
      <div>
        <label for="username">账号</label>
        <input id="username" name="username" type="text" autocomplete="username" required>
      </div>
      <div>
        <label for="password">口令</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button type="submit">登录</button>
    </form>
    <div class="error" id="errorText"></div>
  </section>

  <script>
    const form = document.getElementById("loginForm");
    const errorText = document.getElementById("errorText");
    const username = document.getElementById("username");
    const password = document.getElementById("password");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      errorText.textContent = "";
      try {
        const resp = await fetch("/admin/login", {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: username.value.trim(),
            password: password.value
          })
        });
        const data = await resp.json();
        if (!resp.ok || !data.ok) {
          errorText.textContent = "登录失败: " + (data.error || "unknown");
          return;
        }
        window.location.href = data.redirect || "/admin";
      } catch (err) {
        errorText.textContent = "登录失败: " + String(err);
      }
    });
  </script>
</body>
</html>
